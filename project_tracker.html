<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker · Alto Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d38;
    --accent: #7c6af7;
    --accent2: #e86bdf;
    --green: #38e8a0;
    --yellow: #f7c94b;
    --red: #f76b6b;
    --text: #e8eaf2;
    --muted: #6b7085;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1b2e 0%, #16181f 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }
  .header-title { flex: 1; min-width: 260px; }
  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: .5px; }

  /* PROGRESS BAR */
  .global-progress {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    min-width: 240px;
  }
  .gp-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .gp-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .gp-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .5s ease; }
  .gp-numbers { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .gp-count { font-size: 22px; font-weight: 600; font-family: 'Syne', sans-serif; color: var(--text); }
  .gp-pct { font-size: 12px; color: var(--accent); font-weight: 500; }

  /* NAV */
  .nav {
    display: flex;
    gap: 4px;
    padding: 20px 40px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 18px 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    position: relative;
    bottom: -1px;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 6px; background: var(--border);
    vertical-align: middle; position: relative; top: -1px;
  }
  .nav-dot.done { background: var(--green); }
  .nav-dot.partial { background: var(--yellow); }

  /* MAIN */
  .main { padding: 32px 40px; }

  /* SESSION PANEL */
  .session-panel { display: none; }
  .session-panel.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .session-meta {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  @media (max-width: 720px) { .session-meta { grid-template-columns: 1fr; } }

  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .meta-card-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .meta-card-value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .meta-card-value.accent { color: var(--accent); font-weight: 500; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* TASKS */
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all .18s;
  }
  .task-item:hover { border-color: var(--accent); background: var(--surface2); }
  .task-item.done { border-color: #1f3d2e; background: #0f1f17; }
  .task-item.done .task-text { color: var(--muted); text-decoration: line-through; }

  .task-checkbox {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; transition: all .18s;
    background: none;
  }
  .task-item.done .task-checkbox {
    background: var(--green); border-color: var(--green);
  }
  .task-checkbox svg { display: none; }
  .task-item.done .task-checkbox svg { display: block; }
  .task-text { font-size: 12px; line-height: 1.6; flex: 1; }
  .task-tag {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px; background: var(--surface2);
    color: var(--muted); white-space: nowrap; align-self: center;
  }

  /* CHECKPOINT */
  .checkpoint-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 6px;
  }
  .cp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .cp-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .cp-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .cp-items { display: flex; flex-direction: column; gap: 8px; }
  .cp-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px; color: var(--text); line-height: 1.5;
  }
  .cp-bullet {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all .2s;
  }
  .cp-bullet.ok { background: var(--green); border-color: var(--green); color: #0a1f12; font-weight: 700; }

  .close-session-btn {
    margin-top: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s;
    font-weight: 500;
  }
  .close-session-btn:hover { opacity: .85; }
  .close-session-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* OBSERVATIONS */
  .obs-area {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 12px 14px; resize: vertical;
    min-height: 70px; margin-top: 6px;
    transition: border-color .2s;
  }
  .obs-area:focus { outline: none; border-color: var(--accent); }

  /* SESSION STATUS BADGE */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
  }
  .status-badge.pending { background: #1e1b0e; color: var(--yellow); border: 1px solid #3d3010; }
  .status-badge.partial { background: #1a1630; color: var(--accent); border: 1px solid #2e2850; }
  .status-badge.complete { background: #0f1f17; color: var(--green); border: 1px solid #1a3d27; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="header-label">Proyecto Final Individual</div>
    <h1>Project Tracker</h1>
    <div class="header-sub">Alto Engagement · Seguimiento por sesiones</div>
  </div>
  <div class="global-progress">
    <div class="gp-label">Progreso total</div>
    <div class="gp-bar-wrap"><div class="gp-bar" id="globalBar" style="width:0%"></div></div>
    <div class="gp-numbers">
      <span class="gp-count"><span id="doneCount">0</span>/<span id="totalCount">0</span></span>
      <span class="gp-pct" id="globalPct">0%</span>
    </div>
  </div>
</div>

<div class="nav" id="mainNav"></div>
<div class="main" id="mainContent"></div>

<script>
const SESSIONS = [
  {
    id: 1,
    title: "Sesión 1 — Definir",
    objetivo: "Establecer el marco conceptual del proyecto antes de escribir código.",
    producto: "Notebook estructurado con portada, índice y secciones rellenadas.",
    docente: "Presentación del proyecto, explicación del problema de negocio y construcción del target.",
    individual: "Rellenar secciones 1-3 del notebook: contexto, problema de negocio, definición del target.",
    tasks: [
      { id: "1a", text: "Problema de negocio redactado y contextualizado.", tag: "texto" },
      { id: "1b", text: "Pregunta de negocio clara y específica.", tag: "texto" },
      { id: "1c", text: "Variable objetivo (Target) matemáticamente definida.", tag: "concepto" },
      { id: "1d", text: "Hipótesis inicial sobre qué variables afectarán el modelo.", tag: "concepto" },
      { id: "1e", text: "Notebook estructurado con el índice obligatorio (secciones 1-6).", tag: "notebook" },
    ],
    checkpoint: [
      "Problema de negocio redactado y contextualizado.",
      "Pregunta de negocio clara y específica.",
      "Variable objetivo (Target) matemáticamente definida.",
      "Hipótesis inicial escrita.",
      "Notebook con secciones creadas.",
    ]
  },
  {
    id: 2,
    title: "Sesión 2 — Construir",
    objetivo: "Ejecutar el pipeline técnico completo: carga, exploración, entrenamiento y evaluación inicial.",
    producto: "Notebook con dos modelos entrenados y tabla comparativa de métricas.",
    docente: "Explicación del pipeline, preprocesado, baseline y modelo mejorado.",
    individual: "Ejecutar notebook de inicio a fin, completar exploración y tabla de métricas.",
    tasks: [
      { id: "2a", text: "Dataset cargado y dimensiones verificadas.", tag: "código" },
      { id: "2b", text: "Distribución del target analizada y comentada.", tag: "análisis" },
      { id: "2c", text: "Variables con data leakage excluidas del modelo.", tag: "concepto" },
      { id: "2d", text: "Análisis exploratorio: medias por grupo comentadas.", tag: "análisis" },
      { id: "2e", text: "Split train/test realizado (75/25).", tag: "código" },
      { id: "2f", text: "Baseline (Regresión Logística) entrenado y evaluado.", tag: "modelo" },
      { id: "2g", text: "Modelo mejorado (Random Forest) entrenado y evaluado.", tag: "modelo" },
      { id: "2h", text: "Tabla comparativa de métricas (accuracy, precision, recall, F1, ROC-AUC).", tag: "métricas" },
    ],
    checkpoint: [
      "Notebook ejecuta de principio a fin sin errores.",
      "Dos modelos entrenados y evaluados.",
      "Tabla comparativa de métricas completa.",
      "Comentarios de análisis en las secciones de exploración.",
    ]
  },
  {
    id: 3,
    title: "Sesión 3 — Interpretar",
    objetivo: "Construir la narrativa de negocio a partir de los resultados técnicos.",
    producto: "Borrador de memoria (2-4 pág.) y esquema de 5 diapositivas.",
    docente: "Interpretación de matrices de confusión, análisis de umbrales, redacción de recomendaciones.",
    individual: "Analizar errores, probar umbrales en Model Decision Lab, redactar conclusión provisional.",
    tasks: [
      { id: "3a", text: "Matriz de confusión visualizada para ambos modelos.", tag: "visual" },
      { id: "3b", text: "Interpretación de falsos positivos y negativos para negocio.", tag: "análisis" },
      { id: "3c", text: "Umbral analizado con Model Decision Lab.", tag: "app" },
      { id: "3d", text: "Escenario de umbral elegido y justificado.", tag: "decisión" },
      { id: "3e", text: "Recomendación provisional redactada en sección 17 del notebook.", tag: "texto" },
      { id: "3f", text: "Borrador de memoria (2-4 páginas) completado.", tag: "memoria" },
      { id: "3g", text: "Esquema de las 5 diapositivas esbozado.", tag: "slides" },
    ],
    checkpoint: [
      "Matriz de confusión interpretada en clave de negocio.",
      "Umbral elegido con justificación explícita.",
      "Recomendación provisional redactada.",
      "Borrador de memoria iniciado.",
      "Esquema de presentación esbozado.",
    ]
  },
  {
    id: 4,
    title: "Sesión 4 — Defender",
    objetivo: "Cerrar el proyecto y preparar la defensa oral.",
    producto: "Notebook final + Memoria completa + Presentación 5 slides + Defensa preparada.",
    docente: "Criterios de evaluación, defensa oral, feedback final.",
    individual: "Revisar coherencia del notebook, finalizar memoria y presentación, practicar defensa.",
    tasks: [
      { id: "4a", text: "Notebook revisado: fluye de inicio a fin con lógica coherente.", tag: "notebook" },
      { id: "4b", text: "Limitaciones del proyecto redactadas (sección 21).", tag: "texto" },
      { id: "4c", text: "Conclusión final completa (sección 22).", tag: "texto" },
      { id: "4d", text: "Checklist interno del notebook completado (sección 23).", tag: "revisión" },
      { id: "4e", text: "Memoria finalizada (8 secciones obligatorias).", tag: "memoria" },
      { id: "4f", text: "Presentación final de 5 diapositivas lista.", tag: "slides" },
      { id: "4g", text: "Defensa oral preparada: puedo explicar cada decisión.", tag: "defensa" },
    ],
    checkpoint: [
      "Notebook ejecuta sin errores de inicio a fin.",
      "Memoria entregada con 8 secciones completas.",
      "Presentación de 5 diapositivas finalizada.",
      "Defensa oral preparada y ensayada.",
    ]
  }
];

// STATE
let state = {};
try { state = JSON.parse(localStorage.getItem('pt_state') || '{}'); } catch(e) {}
function save() { try { localStorage.setItem('pt_state', JSON.stringify(state)); } catch(e) {} }

function getTasksDone(s) {
  return s.tasks.filter(t => state[t.id]).length;
}
function isComplete(s) {
  return getTasksDone(s) === s.tasks.length;
}

// NAV
let currentSession = 1;
function renderNav() {
  const nav = document.getElementById('mainNav');
  nav.innerHTML = SESSIONS.map(s => {
    const done = getTasksDone(s);
    const total = s.tasks.length;
    const dotClass = done === 0 ? '' : done === total ? 'done' : 'partial';
    return `<button class="nav-btn ${s.id === currentSession ? 'active' : ''}" onclick="switchSession(${s.id})">
      <span class="nav-dot ${dotClass}"></span>S${s.id}
    </button>`;
  }).join('');
}

function switchSession(id) {
  currentSession = id;
  renderNav();
  renderPanel(id);
  updateGlobal();
}

function renderPanel(sid) {
  const s = SESSIONS.find(x => x.id === sid);
  const done = getTasksDone(s);
  const total = s.tasks.length;
  const pct = Math.round(done / total * 100);
  const badgeClass = done === 0 ? 'pending' : done === total ? 'complete' : 'partial';
  const badgeText = done === 0 ? 'Pendiente' : done === total ? 'Completada' : 'En progreso';

  const cpItems = s.checkpoint.map((item, i) => {
    const allSectionDone = isComplete(s);
    return `<div class="cp-item">
      <div class="cp-bullet ${allSectionDone ? 'ok' : ''}">
        ${allSectionDone ? '✓' : ''}
      </div>
      <span>${item}</span>
    </div>`;
  }).join('');

  const tasksHtml = s.tasks.map(t => {
    const isDone = !!state[t.id];
    return `<div class="task-item ${isDone ? 'done' : ''}" onclick="toggleTask('${t.id}')">
      <div class="task-checkbox">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="#0a1f12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="task-text">${t.text}</span>
      <span class="task-tag">${t.tag}</span>
    </div>`;
  }).join('');

  const obsKey = `obs_s${sid}`;
  const obsVal = state[obsKey] || '';

  document.getElementById('mainContent').innerHTML = `
    <div class="session-panel active">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;">
        <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;">${s.title}</h2>
        <span class="status-badge ${badgeClass}"><span class="status-dot"></span>${badgeText}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:auto;">${done}/${total} tareas · ${pct}%</span>
      </div>

      <div class="session-meta">
        <div class="meta-card">
          <div class="meta-card-label">🎯 Objetivo</div>
          <div class="meta-card-value">${s.objetivo}</div>
        </div>
        <div class="meta-card">
          <div class="meta-card-label">📋 Producto mínimo</div>
          <div class="meta-card-value accent">${s.producto}</div>
        </div>
        <div class="meta-card">
          <div class="meta-card-label">⏱ Hora individual</div>
          <div class="meta-card-value">${s.individual}</div>
        </div>
      </div>

      <div class="section-title">Tareas de esta sesión</div>
      <div class="task-list">${tasksHtml}</div>

      <div class="section-title">Checkpoint obligatorio</div>
      <div class="checkpoint-box">
        <div class="cp-header">
          <div class="cp-icon">✓</div>
          <div class="cp-title">Checkpoint Sesión ${sid}</div>
        </div>
        <div class="cp-items">${cpItems}</div>
        <button class="close-session-btn" id="closeBtn" onclick="closeSession(${sid})" ${isComplete(s) ? '' : 'disabled'}>
          ${isComplete(s) ? '✓ Sesión completada' : 'Completa todas las tareas para cerrar'}
        </button>
      </div>

      <div class="section-title">Observaciones</div>
      <textarea class="obs-area" placeholder="Anota aquí lo que está incompleto, pendiente de revisión o cualquier nota..." 
        onchange="saveObs('${obsKey}', this.value)">${obsVal}</textarea>
    </div>
  `;
}

function toggleTask(id) {
  state[id] = !state[id];
  save();
  renderPanel(currentSession);
  renderNav();
  updateGlobal();
}

function closeSession(sid) {
  const s = SESSIONS.find(x => x.id === sid);
  if (!isComplete(s)) return;
  state[`closed_${sid}`] = true;
  save();
}

function saveObs(key, val) {
  state[key] = val;
  save();
}

function updateGlobal() {
  const allTasks = SESSIONS.flatMap(s => s.tasks);
  const done = allTasks.filter(t => state[t.id]).length;
  const total = allTasks.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('globalPct').textContent = pct + '%';
  document.getElementById('globalBar').style.width = pct + '%';
}

// INIT
renderNav();
renderPanel(1);
updateGlobal();
</script>
</body>
</html>
